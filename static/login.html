<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>Login - Image Hosting</title>
<link rel="stylesheet" href="https://unpkg.com/terminal.css@0.7.4/dist/terminal.min.css">
<style>
  /* Dark mode (default for this app) */
  :root {
    --background-color: #222225;
    --font-color: #e8e9ed;
    --primary-color: #e8b004;
    --secondary-color: #727578;
    --invert-font-color: #222225;
    --code-bg-color: #2a2a2d;
    --error-color: #e24b4b;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --background-color: #fff;
      --font-color: #151515;
      --primary-color: #c9880b;
      --secondary-color: #727578;
      --invert-font-color: #fff;
      --code-bg-color: #e8eff2;
      --error-color: #d20962;
    }
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    margin: 0;
    padding: var(--global-space);
  }
  .login-wrapper {
    width: 100%;
    max-width: 420px;
  }
  .login-wrapper header {
    margin-bottom: calc(var(--global-space) * 3);
  }
  .login-wrapper header h1 {
    margin-bottom: var(--global-space);
    font-size: clamp(1.2rem, 4vw, 1.6rem);
  }
  .login-wrapper header p {
    color: var(--secondary-color);
  }
  .btn-github {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 12px var(--global-space);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn-github svg {
    width: 16px;
    height: 16px;
    fill: var(--invert-font-color);
    flex-shrink: 0;
  }
  .login-footer {
    margin-top: calc(var(--global-space) * 3);
    color: var(--secondary-color);
    font-size: calc(var(--global-font-size) - 2px);
  }
</style>
</head>
<body>
<div class="login-wrapper">
  <header>
    <h1>Image Hosting <span class="terminal-prompt"></span></h1>
    <p>Sign in with your GitHub account to upload files.</p>
  </header>
  <hr>
  <br>
  <a href="/auth/github" class="btn btn-primary btn-github">
    <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
    Sign in with GitHub
  </a>
  <p class="login-footer">Authorized users only.</p>
</div>
</body>
</html>
