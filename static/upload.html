<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>Upload - Image Hosting</title>
<link rel="stylesheet" href="https://unpkg.com/terminal.css@0.7.4/dist/terminal.min.css">
<style>
  /* Dark mode (default for this app) */
  :root {
    --background-color: #222225;
    --font-color: #e8e9ed;
    --primary-color: #e8b004;
    --secondary-color: #727578;
    --invert-font-color: #222225;
    --code-bg-color: #2a2a2d;
    --error-color: #e24b4b;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --background-color: #fff;
      --font-color: #151515;
      --primary-color: #c9880b;
      --secondary-color: #727578;
      --invert-font-color: #fff;
      --code-bg-color: #e8eff2;
      --error-color: #d20962;
    }
  }
  body { margin: 0; }
  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: calc(var(--global-space) * 2) var(--global-space);
  }
  .page > header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--global-space);
    margin-bottom: calc(var(--global-space) * 2);
  }
  .user {
    display: flex;
    align-items: center;
    gap: var(--global-space);
    min-width: 0;
  }
  .user img {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--secondary-color);
    flex-shrink: 0;
  }
  .user .terminal-prompt {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .drop-zone {
    border: 2px dashed var(--secondary-color);
    padding: calc(var(--global-space) * 4) calc(var(--global-space) * 2);
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  @media (min-width: 480px) {
    .drop-zone {
      padding: calc(var(--global-space) * 6) calc(var(--global-space) * 2);
    }
  }
  .drop-zone:hover {
    border-color: var(--primary-color);
  }
  .drop-zone.dragover {
    border-color: var(--primary-color);
    background: rgba(232,176,4,0.05);
  }
  @media (prefers-color-scheme: light) {
    .drop-zone.dragover {
      background: rgba(201,136,11,0.05);
    }
  }
  .drop-zone.uploading {
    pointer-events: none;
    opacity: 0.5;
  }
  .drop-zone p { margin: 0; }
  .drop-zone .hint {
    color: var(--secondary-color);
    font-size: calc(var(--global-font-size) - 2px);
  }
  input[type="file"] { display: none; }

  .results {
    margin-top: calc(var(--global-space) * 2);
  }
  .results table {
    width: 100%;
    margin-bottom: 0;
  }
  .results table td {
    vertical-align: middle;
    font-size: calc(var(--global-font-size) - 1px);
    padding: var(--global-space);
  }
  .results table td.thumb {
    width: 44px;
    padding-right: 0;
  }
  .results table td.thumb img {
    width: 40px;
    height: 40px;
    object-fit: cover;
    display: block;
  }
  .results table td.actions {
    width: 70px;
    text-align: right;
    white-space: nowrap;
  }
  .results table td a {
    word-break: break-all;
  }
  .meta {
    color: var(--secondary-color);
    font-size: calc(var(--global-font-size) - 3px);
  }
  .error-text {
    color: var(--error-color);
  }
  .btn.copied {
    color: var(--font-color);
    border-color: var(--font-color);
  }
  .progress-wrap {
    height: 3px;
    background: var(--code-bg-color);
    margin-top: 4px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--primary-color);
    transition: width 0.2s;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .results table tr { animation: fadeIn 0.3s ease; }

  /* Mobile: stack table cells vertically */
  @media (max-width: 479px) {
    .results table,
    .results table tbody,
    .results table tr,
    .results table td {
      display: block;
      width: 100%;
    }
    .results table tr {
      border-bottom: 1px solid var(--secondary-color);
      padding: var(--global-space) 0;
    }
    .results table td {
      padding: 2px var(--global-space);
      border: none;
    }
    .results table td.thumb {
      width: auto;
      padding-bottom: 4px;
    }
    .results table td.thumb img {
      width: 32px;
      height: 32px;
    }
    .results table td.actions {
      width: auto;
      text-align: left;
      padding-top: 4px;
    }
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="user">
      <img id="avatar" src="" alt="">
      <span class="terminal-prompt" id="username"></span>
    </div>
    <a href="/auth/logout" class="btn btn-default btn-ghost">logout</a>
  </header>
  <hr>
  <div class="drop-zone" id="dropZone">
    <p>Drop files here</p>
    <p class="hint">or click to select &middot; max 20 MB</p>
  </div>
  <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.gif,.webp,.svg,.avif,.ico,.pdf">
  <div class="results" id="results"></div>
</div>
<script>
(function() {
  const username = "{{.Username}}";
  const avatarURL = "{{.AvatarURL}}";
  document.getElementById('username').textContent = username;
  document.getElementById('avatar').src = avatarURL;

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const results = document.getElementById('results');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
  fileInput.addEventListener('change', () => { handleFiles(fileInput.files); fileInput.value = ''; });
  document.addEventListener('paste', (e) => { if (e.clipboardData.files.length > 0) { e.preventDefault(); handleFiles(e.clipboardData.files); } });

  function ensureTable() {
    let table = results.querySelector('table');
    if (!table) {
      table = document.createElement('table');
      const tbody = document.createElement('tbody');
      table.appendChild(tbody);
      results.appendChild(table);
    }
    return table.querySelector('tbody');
  }

  function handleFiles(files) { for (const file of files) uploadFile(file); }

  function uploadFile(file) {
    const tbody = ensureTable();
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td colspan="3">
        <div>${esc(file.name)} <span class="meta">${fmtSize(file.size)}</span></div>
        <div class="progress-wrap"><div class="progress-bar" style="width:0%"></div></div>
      </td>`;
    tbody.insertBefore(tr, tbody.firstChild);

    const fd = new FormData();
    fd.append('file', file);
    const xhr = new XMLHttpRequest();
    const bar = tr.querySelector('.progress-bar');

    xhr.upload.addEventListener('progress', (e) => {
      if (e.lengthComputable) bar.style.width = (e.loaded / e.total * 100) + '%';
    });

    xhr.addEventListener('load', () => {
      if (xhr.status === 201) {
        const d = JSON.parse(xhr.responseText);
        const isImg = /\.(jpg|jpeg|png|gif|webp|svg|avif|ico)$/i.test(d.filename);
        tr.innerHTML = `
          ${isImg ? `<td class="thumb"><img src="${esc(d.url)}" alt=""></td>` : ''}
          <td ${isImg ? '' : 'colspan="2"'}>
            <a href="${esc(d.url)}" target="_blank">${esc(d.url)}</a>
            <div class="meta">${esc(d.filename)} &middot; ${fmtSize(d.size)}</div>
          </td>
          <td class="actions">
            <button class="btn btn-primary btn-small" onclick="copyURL(this,'${esc(d.url)}')">copy</button>
          </td>`;
      } else {
        let msg = 'Upload failed';
        try { msg = JSON.parse(xhr.responseText).error; } catch(e) {}
        tr.innerHTML = `<td colspan="3"><span class="error-text">${esc(file.name)}: ${esc(msg)}</span></td>`;
      }
    });

    xhr.addEventListener('error', () => {
      tr.innerHTML = `<td colspan="3"><span class="error-text">${esc(file.name)}: Network error</span></td>`;
    });

    xhr.open('POST', '/api/upload');
    xhr.send(fd);
  }

  window.copyURL = function(btn, url) {
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = 'copied!';
      btn.classList.remove('btn-primary');
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'copy'; btn.classList.add('btn-primary'); btn.classList.remove('copied'); }, 2000);
    });
  };

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function fmtSize(b) { if (b < 1024) return b + ' B'; if (b < 1048576) return (b/1024).toFixed(1) + ' KB'; return (b/1048576).toFixed(1) + ' MB'; }
})();
</script>
</body>
</html>
